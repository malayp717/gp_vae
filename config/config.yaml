# =============================================================================
# VAE with Beta Annealing - CIFAR-10 (native-resolution default)
# =============================================================================
data:
  dataset: cifar10
  image_size: 32
  in_channels: 3
  batch_size: 256
  num_workers: 4
  pin_memory: true
  data_dir: ./dataset/cifar10
  download: true
  val_split: 0.1

model:
  type: gp_vae                  # can be [vae, gp_vae, sccd, ddpm]
  dropout: 0.0
  use_batch_norm: true

  # --- VAE (convolutional) ---
  latent_dim: 128
  encoder_channels: [32, 64, 128, 256]
  decoder_channels: [256, 128, 64, 32]

  # --- Patch models (GP-VAE / SC-PDT `sccd`) ---
  patch_div: 2
  latent_dim_per_patch: 64
  patch_encoder_channels: [32, 64, 128, 256]
  patch_decoder_channels: [256, 128, 64, 32]

  # --- Transformer ---
  transformer_dim: 256
  transformer_heads: 8
  transformer_layers: 4
  transformer_dropout: 0.1

  # --- GP-VAE structured posterior ---
  covariance_rank: 8

  # --- SC-PDT (`sccd`) only ---
  diffusion_T: 1000
  sample_steps: 2
  sccd_patch_size: 16
  sccd_model_dim: 256
  sccd_num_enc_blocks: 2
  sccd_num_attn_blocks: 4
  sccd_heads: 4
  sccd_head_dim: 64
  sccd_rank: 8
  sccd_window_size: 2
  sccd_global_every: 4
  sccd_sampler_mode: hybrid
  sccd_ddim_eta: 0.0
  sccd_rank_gamma: 1.5
  sccd_k_min_frac: 0.125
  sccd_boundary_hidden: 64
  sccd_boundary_width: 2
  sccd_min_log_sigma: -1.5
  sccd_max_log_sigma: 1.5

  # --- DDPM only ---
  ddpm_base_channels: 64
  ddpm_channel_multipliers: [1, 2, 4]
  ddpm_num_res_blocks: 2
  ddpm_dropout: 0.0
  ddpm_beta_schedule: linear
  ddpm_sample_steps: 1000

beta_annealing:
  enabled: true
  schedule: cosine
  beta_min: 0.01
  beta_max: 0.2
  warmup_epochs: 80
  cycle_epochs: 40
  n_cycles: 4
  ratio_increase: 0.5

training:
  epochs: 200
  learning_rate: 5.0e-4
  weight_decay: 1.0e-4
  gradient_clip_norm: 1.0
  seed: 42
  mixed_precision: true
  compile_model: false
  early_stopping_patience: 30
  disc_train_interval_epochs: 5

loss:
  recon_weight: 1.0
  free_bits_nats: 0.25
  lpips_enabled: true
  lpips_weight: 0.25
  lpips_net: alex
  adv_enabled: false
  adv_weight: 0.01
  adv_start_epoch: 5
  disc_channels: 64
  disc_layers: 3
  sccd_lambda_recon: 1.0
  sccd_lambda_boundary: 0.5
  sccd_lambda_rank: 0.25
  sccd_lambda_sigma: 1.0
  sccd_sigma_reg_target: 0.3

optimizer:
  name: adamw
  betas: [0.9, 0.95]
  eps: 1.0e-8

scheduler:
  name: cosine_warmup
  warmup_epochs: 10
  min_lr: 1.0e-6

paths:
  checkpoint_dir: ./checkpoints
  resume_from: null
  output_dir: ./outputs

logging:
  log_interval: 50
  save_interval: 10
  eval_interval: 10
  metrics_interval: 20
  artifact_interval: 20
  num_fid_samples: 512
  num_samples: 25
  num_reconstructions: 10