# =============================================================================
# VAE with Beta Annealing - CIFAR-10 (native-resolution default)
# =============================================================================

data:
  dataset: cifar10
  image_size: 32                # keep CIFAR-10 at its native 32x32 resolution
  in_channels: 3
  batch_size: 128
  num_workers: 4
  pin_memory: true
  data_dir: ./dataset/cifar10
  download: true
  val_split: 0.1

model:
  type: vae                     # vae | gp_vae | sccd | ddpm

  # --- shared ---
  dropout: 0.1
  use_batch_norm: true

  # --- VAE (convolutional) ---
  latent_dim: 256
  encoder_channels: [32, 64, 128, 128, 256]   # vary these per dataset/model scale
  decoder_channels: [256, 128, 128, 64, 32]   # vary these per dataset/model scale

  # --- Patch models (GP-VAE / SCCD) ---
  patch_div: 2                  # 2x2 grid -> 4 patches total; CIFAR-10 patches are 16x16x3
  latent_dim_per_patch: 128     # per-patch latent dim (total = 4 x 128 = 512)
  patch_encoder_channels: [32, 64, 128, 256]  # vary these per dataset/model scale
  patch_decoder_channels: [256, 128, 64, 32]  # vary these per dataset/model scale

  # --- Patch-Transformer-VAE, GP-VAE, and SCCD (shared transformer config) ---
  transformer_dim: 256            # hidden size of transformer
  transformer_heads: 8
  transformer_layers: 4
  transformer_dropout: 0.1

  # --- GP-VAE and SCCD (structured posterior covariance) ---
  covariance_rank: 4             # rank k of low-rank factor V (k << d)

  # --- SCCD only (consistency-distilled DiT denoiser) ---
  dit_depth: 6
  dit_heads: 4
  dit_dropout: 0.1
  num_classes: 10
  diffusion_T: 1000
  sample_steps: 1

  # --- DDPM only (pixel-space U-Net denoiser) ---
  ddpm_base_channels: 64
  ddpm_channel_multipliers: [1, 2, 4]
  ddpm_num_res_blocks: 2
  ddpm_dropout: 0.0
  ddpm_beta_schedule: linear
  ddpm_sample_steps: 1000

beta_annealing:
  enabled: true
  schedule: cyclical          # linear | cosine | cyclical
  beta_min: 0.0
  beta_max: 2.0
  warmup_epochs: 60
  cycle_epochs: 30
  n_cycles: 4
  ratio_increase: 0.5        # fraction of cycle spent increasing

training:
  epochs: 200
  learning_rate: 3.0e-4
  weight_decay: 1.0e-5
  gradient_clip_norm: 1.0
  seed: 42
  mixed_precision: true
  compile_model: false        # torch.compile (PyTorch 2+)
  early_stopping_patience: 20
  ema_decay: 0.999            # SCCD EMA decay for the target denoiser
  consistency_k_steps: 5      # SCCD timestep gap between t and t'

loss:
  recon_weight: 1.0              # MSE reconstruction weight
  lpips_enabled: false           # toggle perceptual loss on/off
  lpips_weight: 0.25             # perceptual loss weight
  lpips_net: alex                 # backbone for LPIPS ("vgg" or "alex")
  adv_enabled: false             # toggle adversarial (PatchGAN) loss on/off
  adv_weight: 0.01                # generator adversarial weight
  adv_start_epoch: 5            # delay adv loss until VAE learns basic reconstruction
  disc_channels: 64              # base channels in discriminator
  disc_layers: 3                 # strided layers in discriminator
  consistency_weight: 1.0        # SCCD consistency loss weight

optimizer:
  name: adamw
  betas: [0.9, 0.999]
  eps: 1.0e-8

scheduler:
  name: cosine_warmup
  warmup_epochs: 5
  min_lr: 1.0e-6

paths:
  checkpoint_dir: ./checkpoints
  resume_from: null            # set to a .pt path to auto-resume training
  output_dir: ./outputs

logging:
  log_interval: 50
  save_interval: 5
  eval_interval: 5              # validate + compute FID/SSIM/PSNR every N epochs
  num_fid_samples: 1024         # images used for FID estimation
  num_samples: 64
  num_reconstructions: 16
